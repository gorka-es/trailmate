<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrailMate</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #111009;
  color: #eeebe5;
  font-family: 'DM Sans', sans-serif;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* SPLASH */
#splash {
  display: flex;
  flex-direction: column;
  align-items: center;
  transition: opacity 0.5s ease;
}
#splash.hide { opacity: 0; pointer-events: none; }

.splash-logo {
  width: 72px; height: 72px;
  border-radius: 20px;
  background: #e8831a;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue'; font-size: 36px; color: #111009;
  margin-bottom: 20px;
  box-shadow: 0 0 32px rgba(232,131,26,0.4);
}
.splash-name {
  font-family: 'Bebas Neue'; font-size: 38px;
  letter-spacing: 5px; color: #eeebe5; margin-bottom: 6px;
}
.splash-sub { font-size: 13px; color: #8a96a0; margin-bottom: 40px; }
.dots { display: flex; gap: 8px; }
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: #e8831a;
  animation: bounce 0.9s ease-in-out infinite;
}
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes bounce {
  0%,100% { transform: translateY(0); opacity: 0.3; }
  50%      { transform: translateY(-10px); opacity: 1; }
}

/* LOGIN */
#login {
  display: none;
  flex-direction: column;
  align-items: center;
  width: 100%;
  padding: 20px;
  animation: up 0.5s ease;
}
@keyframes up { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

.card {
  background: #1c1910;
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: 18px;
  padding: 36px 32px;
  width: 100%; max-width: 420px;
}
.logo-row { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
.logo-mark {
  width:44px; height:44px; border-radius:12px;
  background:#e8831a; display:flex; align-items:center; justify-content:center;
  font-family:'Bebas Neue'; font-size:22px; color:#111009; flex-shrink:0;
  box-shadow:0 0 18px rgba(232,131,26,0.35);
}
.logo-name { font-family:'Bebas Neue'; font-size:26px; letter-spacing:2px; }
.logo-sub  { font-size:11px; color:#8a96a0; margin-top:-2px; }

.tabs { display:flex; background:#241e11; border-radius:10px; padding:3px; margin-bottom:22px; }
.tab {
  flex:1; padding:8px; border-radius:8px; border:none;
  background:transparent; color:#8a96a0;
  font-family:'DM Sans'; font-size:13px; font-weight:500; cursor:pointer; transition:all .15s;
}
.tab.active { background:#30281a; color:#eeebe5; }

.pane { display:none; }
.pane.active { display:block; }

.f-title { font-family:'Bebas Neue'; font-size:20px; letter-spacing:1.5px; margin-bottom:4px; }
.f-sub   { font-size:12px; color:#8a96a0; margin-bottom:18px; line-height:1.5; }

.f-label { font-size:10px; text-transform:uppercase; letter-spacing:.9px; color:#8a96a0; font-weight:500; margin-bottom:5px; display:block; }
.f-input {
  width:100%; padding:11px 13px;
  background:#241e11; border:1px solid rgba(255,255,255,0.13);
  border-radius:10px; color:#eeebe5;
  font-family:'DM Sans'; font-size:14px; outline:none;
  transition:border-color .15s; margin-bottom:12px;
}
.f-input:focus { border-color:#e8831a; }
.f-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.btn-main {
  width:100%; padding:12px; border-radius:10px; border:none;
  background:#e8831a; color:#111009;
  font-family:'DM Sans'; font-size:14px; font-weight:700;
  cursor:pointer; transition:all .15s; margin-bottom:6px;
}
.btn-main:hover { background:#f5a623; }
.btn-main:disabled { opacity:.5; cursor:not-allowed; }

.btn-google {
  width:100%; padding:11px; border-radius:10px;
  border:1px solid rgba(255,255,255,0.13); background:#241e11; color:#c8d0d8;
  font-family:'DM Sans'; font-size:13px; font-weight:500; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:10px;
  transition:all .15s; margin-bottom:14px;
}
.btn-google:hover { background:#30281a; }

.divider { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
.divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.07); }
.divider span { font-size:11px; color:#8a96a0; }

.msg-err { background:rgba(232,69,69,.13); border:1px solid rgba(232,69,69,.25); border-radius:8px; padding:9px 12px; font-size:12px; color:#e84545; margin-bottom:12px; display:none; }
.msg-ok  { background:rgba(126,203,95,.13); border:1px solid rgba(126,203,95,.25); border-radius:8px; padding:9px 12px; font-size:12px; color:#7ecb5f; margin-bottom:12px; display:none; }
.forgot  { font-size:11px; color:#8a96a0; text-align:center; margin-top:10px; cursor:pointer; display:block; }
.forgot:hover { color:#e8831a; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">TM</div>
  <div class="splash-name">TrailMate</div>
  <div class="splash-sub">Tu compañero MTB</div>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<!-- LOGIN -->
<div id="login">
  <div class="card">
    <div class="logo-row">
      <div class="logo-mark">TM</div>
      <div>
        <div class="logo-name">TrailMate</div>
        <div class="logo-sub">Tu compañero MTB</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="tab" onclick="switchTab('register')">Crear cuenta</button>
    </div>

    <!-- PANE: LOGIN -->
    <div class="pane active" id="pane-login">
      <div class="f-title">Bienvenido</div>
      <div class="f-sub">Accede a tu taller, rutas y plan de entrenamiento.</div>
      <div class="msg-err" id="login-err"></div>
      <div class="msg-ok"  id="login-ok"></div>
      <button class="btn-google" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continuar con Google
      </button>
      <div class="divider"><span>o con email</span></div>
      <label class="f-label">Email</label>
      <input class="f-input" id="l-email" type="email" placeholder="tu@email.com" autocomplete="email">
      <label class="f-label">Contraseña</label>
      <input class="f-input" id="l-pass" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="btn-main" id="l-btn" onclick="doLogin()">Entrar</button>
      <a class="forgot" onclick="doReset()">¿Olvidaste tu contraseña?</a>
    </div>

    <!-- PANE: REGISTER -->
    <div class="pane" id="pane-register">
      <div class="f-title">Crea tu cuenta</div>
      <div class="f-sub">Únete a TrailMate y empieza a gestionar tu bici.</div>
      <div class="msg-err" id="reg-err"></div>
      <div class="msg-ok"  id="reg-ok"></div>
      <button class="btn-google" onclick="doGoogle()">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Registrarse con Google
      </button>
      <div class="divider"><span>o con email</span></div>
      <div class="f-row">
        <div><label class="f-label">Nombre</label><input class="f-input" id="r-name" type="text" placeholder="Javi"></div>
        <div><label class="f-label">Usuario</label><input class="f-input" id="r-user" type="text" placeholder="javi_mtb"></div>
      </div>
      <label class="f-label">Email</label>
      <input class="f-input" id="r-email" type="email" placeholder="tu@email.com" autocomplete="email">
      <label class="f-label">Contraseña</label>
      <input class="f-input" id="r-pass" type="password" placeholder="mín. 6 caracteres" autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
      <button class="btn-main" id="r-btn" onclick="doRegister()">Crear cuenta</button>
    </div>
  </div>
</div>

<script>
// ── STEP 1: splash durante 3s, luego login ────────────────────
setTimeout(function() {
  var splash = document.getElementById('splash');
  var login  = document.getElementById('login');
  splash.classList.add('hide');
  setTimeout(function() {
    splash.style.display = 'none';
    login.style.display  = 'flex';
  }, 500);
}, 3000);

// ── STEP 2: cargar Supabase en paralelo ───────────────────────
var SUPA_URL = 'https://lkmsekaseovdnyyzqsic.supabase.co';
var SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxrbXNla2FzZW92ZG55eXpxc2ljIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NjMxOTUsImV4cCI6MjA5MDAzOTE5NX0.onn5O7KKbBJCmxc015sOvNAIGD2TZwDfNV1KgBQnGS8';
var db = null;

function loadSupabase(urls, idx) {
  if (idx >= urls.length) return;
  var s = document.createElement('script');
  s.src = urls[idx];
  s.onload = function() { db = window.supabase.createClient(SUPA_URL, SUPA_KEY); };
  s.onerror = function() { loadSupabase(urls, idx + 1); };
  document.head.appendChild(s);
}
loadSupabase([
  'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js',
  'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.min.js'
], 0);

// ── HELPERS ───────────────────────────────────────────────────
function showErr(id, msg) { var e=document.getElementById(id); e.textContent=msg; e.style.display='block'; }
function showOk(id, msg)  { var e=document.getElementById(id); e.textContent=msg; e.style.display='block'; }
function hideAll(ids)     { ids.forEach(function(id){ document.getElementById(id).style.display='none'; }); }
function xlate(m) {
  if (m.indexOf('Invalid login') > -1)      return 'Email o contraseña incorrectos.';
  if (m.indexOf('already registered') > -1) return 'Este email ya está registrado.';
  if (m.indexOf('Password should') > -1)    return 'Contraseña mínimo 6 caracteres.';
  return m;
}
function checkDB() {
  if (!db) { showErr('login-err', 'La librería de auth aún está cargando, espera un momento.'); return false; }
  return true;
}

// ── TABS ──────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(function(t, i) {
    t.classList.toggle('active', (i===0) === (tab==='login'));
  });
  document.getElementById('pane-login').classList.toggle('active', tab==='login');
  document.getElementById('pane-register').classList.toggle('active', tab==='register');
}

// ── LOGIN ─────────────────────────────────────────────────────
async function doLogin() {
  if (!checkDB()) return;
  var email = document.getElementById('l-email').value.trim();
  var pass  = document.getElementById('l-pass').value;
  hideAll(['login-err','login-ok']);
  if (!email || !pass) { showErr('login-err','Completa todos los campos.'); return; }
  var btn = document.getElementById('l-btn');
  btn.disabled = true; btn.textContent = 'Entrando...';
  var res = await db.auth.signInWithPassword({ email: email, password: pass });
  btn.disabled = false; btn.textContent = 'Entrar';
  if (res.error) { showErr('login-err', xlate(res.error.message)); return; }
  // ✅ Login OK — aquí conectaremos la app en el próximo paso
  alert('✅ Login correcto. Hola, ' + res.data.user.email);
}

// ── REGISTER ─────────────────────────────────────────────────
async function doRegister() {
  if (!checkDB()) return;
  var name  = document.getElementById('r-name').value.trim();
  var uname = document.getElementById('r-user').value.trim().toLowerCase().replace(/\s+/g,'_');
  var email = document.getElementById('r-email').value.trim();
  var pass  = document.getElementById('r-pass').value;
  hideAll(['reg-err','reg-ok']);
  if (!name||!uname||!email||!pass) { showErr('reg-err','Completa todos los campos.'); return; }
  if (pass.length < 6) { showErr('reg-err','Contraseña mínimo 6 caracteres.'); return; }
  var btn = document.getElementById('r-btn');
  btn.disabled = true; btn.textContent = 'Creando cuenta...';
  var res = await db.auth.signUp({ email:email, password:pass, options:{data:{full_name:name, username:uname}} });
  btn.disabled = false; btn.textContent = 'Crear cuenta';
  if (res.error) { showErr('reg-err', xlate(res.error.message)); return; }
  showOk('reg-ok', '✓ Cuenta creada. Revisa tu email para confirmar.');
}

// ── GOOGLE ────────────────────────────────────────────────────
async function doGoogle() {
  if (!checkDB()) return;
  var res = await db.auth.signInWithOAuth({ provider:'google', options:{redirectTo: window.location.href} });
  if (res.error) showErr('login-err', 'Error Google: ' + res.error.message);
}

// ── RESET ────────────────────────────────────────────────────
async function doReset() {
  if (!checkDB()) return;
  var email = document.getElementById('l-email').value.trim();
  if (!email) { showErr('login-err','Introduce tu email primero.'); return; }
  await db.auth.resetPasswordForEmail(email, { redirectTo: window.location.href });
  showOk('login-ok','✓ Email de recuperación enviado.');
}
</script>
</body>
</html>
